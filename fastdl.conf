server {
    listen 27020;

    root /usr/share/nginx/html;
    autoindex off;

    # Only serve content clients need to download
    location /cstrike/maps/ {
        expires 7d;
    }

    location /cstrike/materials/ {
        expires 7d;
    }

    location /cstrike/models/ {
        expires 7d;
    }

    location /cstrike/sound/ {
        expires 7d;
    }

    # Block everything else
    location / {
        return 403;
    }
}
