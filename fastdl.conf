server {
    listen 27020;

    root /usr/share/nginx/html;
    autoindex off;

    # Only serve content clients need to download
    location /maps/ {
        expires 7d;
    }

    location /materials/ {
        expires 7d;
    }

    location /models/ {
        expires 7d;
    }

    location /sound/ {
        expires 7d;
    }

    # Block everything else
    location / {
        return 403;
    }
}
