services:
  casual:
    build:
      context: .
      args:
        SERVER_DIR: servers/casual
    container_name: css-casual
    restart: unless-stopped
    ports:
      - "27015:27015/tcp"
      - "27015:27015/udp"
    stdin_open: true
    tty: true
    volumes:
      - ./data/casual:/home/steam/css

