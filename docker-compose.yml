services:
  casual:
    build: .
    container_name: css-casual
    network_mode: host
    working_dir: /css
    volumes:
      - ./instances/casual/css:/css
      - ./instances/casual/sdk32:/home/steam/.steam/sdk32:ro
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file: .env
    command: ["-game", "cstrike", "-console", "-tickrate", "128", "-port", "27015", "+maxplayers", "24", "+sv_setsteamaccount", "${STEAM_LOGIN_TOKEN}", "+sv_downloadurl", "${FASTDL_URL}", "+map", "de_dust2"]

  fastdl:
    image: nginx:alpine
    container_name: css-fastdl
    network_mode: host
    volumes:
      - ./instances/casual/css:/usr/share/nginx/html:ro
      - ./fastdl.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

