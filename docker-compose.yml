services:
  casual:
    build: .
    container_name: css-casual
    network_mode: host
    working_dir: /css
    volumes:
      - ./instances/casual/css:/css
      - ./instances/casual/sdk32:/home/steam/.steam/sdk32:ro
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: ["-game", "cstrike", "-console", "-tickrate", "128", "-port", "27015", "+maxplayers", "24", "+map", "de_dust2"]

